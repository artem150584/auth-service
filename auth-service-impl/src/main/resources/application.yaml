server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth
    username: postgres
    password: Password123
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db.changelog-master-auth.yaml
    default-schema: public
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

application:
  token:
    expiry-threshold: 5m
    lifetime: 1h